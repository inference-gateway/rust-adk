---
services:
  redis:
    image: redis:8-alpine
    profiles:
      - redis
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 2s
      timeout: 2s
      retries: 10
    networks:
      - a2a-network

  server:
    build:
      context: ../..
      dockerfile: examples/Dockerfile.server
      args:
        BIN_NAME: queue-storage-server
        EXAMPLE_PATH: examples/queue-storage
        # Always compile the lib with the `redis` feature so the same
        # binary supports both `A2A_QUEUE_PROVIDER=memory` and `=redis`
        # without a separate image.
        CARGO_FEATURES: redis
    environment:
      A2A_QUEUE_PROVIDER: ${A2A_QUEUE_PROVIDER:-memory}
      A2A_QUEUE_URL: ${A2A_QUEUE_URL:-}
      A2A_QUEUE_NAMESPACE: ${A2A_QUEUE_NAMESPACE:-a2a}
      A2A_QUEUE_WORKERS: ${A2A_QUEUE_WORKERS:-1}
      APP_DELAY_MS: ${APP_DELAY_MS:-2000}
    depends_on:
      redis:
        condition: service_healthy
        required: false
    healthcheck:
      test:
        - CMD
        - curl
        - --fail
        - --silent
        - http://localhost:8080/health
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - a2a-network

  client:
    build:
      context: ../..
      dockerfile: examples/Dockerfile.client
      args:
        BIN_NAME: queue-storage-client
    depends_on:
      server:
        condition: service_healthy
    environment:
      SERVER_URL: http://server:8080
      EXAMPLE_TASKS: ${EXAMPLE_TASKS:-5}
    networks:
      - a2a-network

networks:
  a2a-network:
    driver: bridge
