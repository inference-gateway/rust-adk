version: "3"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  install:typify:
    desc: Install Typify CLI tool
    cmds:
      - cargo install cargo-typify

  a2a:download-schema:
    desc: Download the latest A2A schema and convert to YAML
    cmds:
      - curl -o schema.json https://raw.githubusercontent.com/inference-gateway/schemas/refs/heads/main/a2a/a2a-schema.json
      - curl -o schema.yaml https://raw.githubusercontent.com/inference-gateway/schemas/refs/heads/main/a2a/a2a-schema.yaml

  a2a:generate-types:
    deps:
      - install:typify
    desc: Generate the Rust ADK types from the A2A schema
    cmds:
      - cargo typify schema.json -o src/a2a_types.rs
      - |
        {
          echo '#![allow(irrefutable_let_patterns)]'
          echo '#![allow(clippy::unit_arg)]'
          echo '#![allow(clippy::large_enum_variant)]'
          echo '#![allow(clippy::enum_variant_names)]'
          echo '#![allow(clippy::derivable_impls)]'
          echo '#![allow(clippy::uninlined_format_args)]'
          cat src/a2a_types.rs
        } > src/a2a_types.rs.tmp && mv src/a2a_types.rs.tmp src/a2a_types.rs
      - echo "A2A types generated successfully in src/a2a_types.rs"
      - cargo fmt --all

  lint:
    desc: Run linter
    cmds:
      - cargo fmt --all -- --check

  lint:fix:
    desc: Run linter and fix issues
    cmds:
      - cargo fmt --all

  analyse:
    desc: Run static analysis
    cmds:
      - cargo clippy --all-targets --all-features -- -D warnings

  test:
    desc: Run tests
    cmds:
      - cargo test --all-targets --all-features

  examples:minimal-server:
    desc: Run the minimal A2A server example (requires Inference Gateway at localhost:8080)
    dir: examples/minimal
    cmds:
      - cargo run --example minimal-server

  examples:minimal-client:
    desc: Run the minimal A2A client example (requires the minimal server at localhost:8081)
    dir: examples/minimal
    cmds:
      - cargo run --example minimal-client

  examples:static-agent-card-server:
    desc: Run the static-agent-card A2A server example (requires environment config and Inference Gateway)
    dir: examples/static-agent-card
    cmds:
      - cargo run --example static-agent-card-server

  examples:static-agent-card-client:
    desc: Run the static-agent-card A2A client example (requires the server at localhost:8081)
    dir: examples/static-agent-card
    cmds:
      - cargo run --example static-agent-card-client

  examples:ai-powered-server:
    desc: Run the AI-powered A2A server example with tools (requires Inference Gateway at localhost:8080)
    dir: examples/ai-powered
    cmds:
      - cargo run --example ai-powered-server

  examples:ai-powered-client:
    desc: Run the AI-powered A2A client example (requires the server at localhost:8082)
    dir: examples/ai-powered
    cmds:
      - cargo run --example ai-powered-client

  examples:ai-powered-streaming-server:
    desc: Run the AI-powered streaming server example (requires Inference Gateway at localhost:8080)
    dir: examples/ai-powered-streaming
    cmds:
      - cargo run --example ai-powered-streaming-server

  examples:ai-powered-streaming-client:
    desc: Run the AI-powered streaming client example (requires the server at localhost:8084)
    dir: examples/ai-powered-streaming
    cmds:
      - cargo run --example ai-powered-streaming-client

  examples:default-handlers-server:
    desc: Run the default-handlers server example (requires Inference Gateway at localhost:8080)
    dir: examples/default-handlers
    cmds:
      - cargo run --example default-handlers-server

  examples:default-handlers-client:
    desc: Run the default-handlers client example (requires the server at localhost:8085)
    dir: examples/default-handlers
    cmds:
      - cargo run --example default-handlers-client

  examples:streaming-server:
    desc: Run the streaming server example (no AI required)
    dir: examples/streaming
    cmds:
      - cargo run --example streaming-server

  examples:streaming-client:
    desc: Run the streaming client example (requires the server at localhost:8086)
    dir: examples/streaming
    cmds:
      - cargo run --example streaming-client

  examples:input-required-server:
    desc: Run the input-required server example (no AI required)
    dir: examples/input-required
    cmds:
      - cargo run --example input-required-server

  examples:input-required-client:
    desc: Run the input-required client example (requires the server at localhost:8087)
    dir: examples/input-required
    cmds:
      - cargo run --example input-required-client

  examples:queue-storage-server:
    desc: Run the queue-storage server example (in-memory by default; built with `redis` feature so A2A_QUEUE_PROVIDER=redis is available)
    dir: examples/queue-storage
    cmds:
      - cargo run --features redis --example queue-storage-server

  examples:queue-storage-client:
    desc: Run the queue-storage client example (requires the server at localhost:8083)
    dir: examples/queue-storage
    cmds:
      - cargo run --example queue-storage-client

  examples:a2a-methods-server:
    desc: Run the shared offline server used by every a2a-methods client example (port 8085)
    dir: examples/a2a-methods
    cmds:
      - cargo run --example a2a-methods-server

  examples:a2a-methods-message-send:
    desc: Run the a2a-methods client for the `message/send` JSON-RPC method
    dir: examples/a2a-methods
    cmds:
      - cargo run --example a2a-methods-message-send

  examples:a2a-methods-message-stream:
    desc: Run the a2a-methods client for the `message/stream` JSON-RPC method
    dir: examples/a2a-methods
    cmds:
      - cargo run --example a2a-methods-message-stream

  examples:a2a-methods-tasks-get:
    desc: Run the a2a-methods client for the `tasks/get` JSON-RPC method
    dir: examples/a2a-methods
    cmds:
      - cargo run --example a2a-methods-tasks-get

  examples:a2a-methods-tasks-list:
    desc: Run the a2a-methods client for the `tasks/list` JSON-RPC method
    dir: examples/a2a-methods
    cmds:
      - cargo run --example a2a-methods-tasks-list

  examples:a2a-methods-tasks-cancel:
    desc: Run the a2a-methods client for the `tasks/cancel` JSON-RPC method
    dir: examples/a2a-methods
    cmds:
      - cargo run --example a2a-methods-tasks-cancel

  examples:a2a-methods-push-config-set:
    desc: Run the a2a-methods client for the `tasks/pushNotificationConfig/set` JSON-RPC method
    dir: examples/a2a-methods
    cmds:
      - cargo run --example a2a-methods-push-config-set

  examples:a2a-methods-push-config-get:
    desc: Run the a2a-methods client for the `tasks/pushNotificationConfig/get` JSON-RPC method
    dir: examples/a2a-methods
    cmds:
      - cargo run --example a2a-methods-push-config-get

  examples:a2a-methods-push-config-list:
    desc: Run the a2a-methods client for the `tasks/pushNotificationConfig/list` JSON-RPC method
    dir: examples/a2a-methods
    cmds:
      - cargo run --example a2a-methods-push-config-list

  examples:a2a-methods-push-config-delete:
    desc: Run the a2a-methods client for the `tasks/pushNotificationConfig/delete` JSON-RPC method
    dir: examples/a2a-methods
    cmds:
      - cargo run --example a2a-methods-push-config-delete
