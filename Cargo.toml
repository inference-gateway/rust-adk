[package]
name = "inference-gateway-adk"
version = "0.2.5"
edition = "2024"
description = "Agent Development Kit (ADK) for building powerful, interoperable AI agents with the Agent-to-Agent (A2A) protocol"
license = "MIT"
documentation = "https://docs.rs/inference-gateway-adk"
authors = ["Inference Gateway Team"]
repository = "https://github.com/inference-gateway/rust-adk"
homepage = "https://github.com/inference-gateway/rust-adk"
keywords = ["agent", "ai", "inference", "gateway", "a2a"]
categories = ["api-bindings", "development-tools"]

[dependencies]
inference-gateway-sdk = "0.13.3"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tokio = { version = "1.52.3", features = ["full"] }
axum = { version = "0.8.9", features = ["json", "http2"] }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
chrono = { version = "0.4.44", features = ["serde"] }
uuid = { version = "1.23.1", features = ["v4", "serde"] }
anyhow = "1.0.102"
thiserror = "2.0.18"
tower = "0.5.3"
tower-http = { version = "0.6.10", features = ["cors", "trace"] }
futures = "0.3.32"
futures-util = "0.3.32"
async-trait = "0.1.89"
reqwest = { version = "0.13.3", features = ["json"] }
regress = "0.11.1"

[[example]]
name = "minimal-server"
path = "examples/minimal/server/main.rs"

[[example]]
name = "minimal-client"
path = "examples/minimal/client/main.rs"

[[example]]
name = "static-agent-card-server"
path = "examples/static-agent-card/server/main.rs"

[[example]]
name = "static-agent-card-client"
path = "examples/static-agent-card/client/main.rs"

[[example]]
name = "server-with-toolbox-server"
path = "examples/server-with-toolbox/server/main.rs"

[[example]]
name = "server-with-toolbox-client"
path = "examples/server-with-toolbox/client/main.rs"
